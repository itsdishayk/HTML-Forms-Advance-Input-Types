<section>
    <h2>Day 4: Advance Input Types & Forms</h2>
    
    <form action="#">
        <fieldset>
            <legend>User Preferences & Feedback</legend>

            <article>
                <label for="favcolor">Select your Favorite Color:</label>
                <input type="color" id="favcolor" name="favcolor" value="#ff0000">
            </article>

            <article>
                <label for="birthday">Select your Birthday:</label>
                <input type="date" id="birthday" name="birthday">
            </article>

            <article>
                <label for="points">Self-Rating (0 to 10):</label>
                <input type="range" id="points" name="points" min="0" max="10">
            </article>

            <article>
                <label for="quantity">Quantity (between 1 and 5):</label>
                <input type="number" id="quantity" name="quantity" min="1" max="5">
            </article>

            <article>
                <label for="appt">Select a time for Review:</label>
                <input type="time" id="appt" name="appt">
            </article>

            <br>
            <button type="submit">Submit Preferences</button>
        </fieldset>
    </form>

    <aside>
        <p><strong>Pro Tip:</strong> Advance input types like <code>date</code> and <code>color</code> automatically provide a native UI (user interface) on mobile devices, making your form very user-friendly!</p>
    </aside>
</section>
